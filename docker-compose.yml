services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  mongodb:
    image: mongo:5.0
    # healthcheck:
    #   test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 5
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  # mongo-setup:
  #   image: mongo:5.0
  #   depends_on:
  #     - mongodb
  #   entrypoint: >
  #     bash -c "
  #       echo 'Waiting for MongoDB to start...' &&
  #       sleep 5 &&
  #       mongosh --host mongodb:27017 --eval 'rs.initiate()' &&
  #       echo 'Replica Set initialized successfully!'
  #     "
  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017/multimedia_db
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=pass
    depends_on:
      - mongodb

  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  api:
    build: ./api
    ports: 
      - "5000:5000"
    environment:
      - MINIO_ENDPOINT=minio
    env_file:
      - .env
    volumes:
      - ./api:/app
      - /app/node_modules
      - ./.env:/app/.env
    depends_on:
      - minio
      - mongodb
      - rabbitmq
  frontend:
    build:
      context: ./frontend/PISIOFront
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "3000:3000"
    environment:
      - ORIGIN=${FRONTEND_URL}
      - VITE_API_URL=${VITE_API_URL}
    env_file:
      - .env

volumes:
  minio_data:
  mongo_data:
